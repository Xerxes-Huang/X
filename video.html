<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频</title>
<link rel="stylesheet" href="css/video.css">
</head>
<body>
    <div class="page"></div>
    <div class="back" onclick="switchPage('index')">
        <h1><strong><em><返回</em></strong></h1></div>
    </div>
    <div class="next-page" onclick="switchPage('text')">
        <h2><strong><em>>下一页：文本</em></strong></h2>
    </div>
    <div class="function">
        <div class="function-bg"></div>
        <div class="playone" onclick="playVideo('v1')"><img src="css/assets/first/player.png" alt="langyue"></div>
        <div class="playtwo" onclick="playVideo('v2')"><img src="css/assets/first/player.png" alt="title"></div>
        <div class="playthree" onclick="playVideo('v3')"><img src="css/assets/first/player.png" alt="transportation"></div>
        <div class="playfour" onclick="playVideo('v4')"><img src="css/assets/first/player.png" alt="four"></div>
    </div>

    <div class="video-mask">
        <div class="close-btn" onclick="closeVideo()">×</div>
        <video id="videoPlayer" controls></video>
    </div>
    <script src="js/video.js"></script>
    <script src="js/common.js"></script>
</body>
</html>
